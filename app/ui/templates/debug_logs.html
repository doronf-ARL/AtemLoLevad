<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Debug Logs</title><style>body { font-family: Georgia, serif; margin: 2rem auto; max-width: 1000px; } nav a { margin-right: 1rem; color: #92400e; } .log { border: 1px solid #d1d5db; padding: 1rem; border-radius: 10px; background: #fafaf9; margin-bottom: 1rem; } pre { white-space: pre-wrap; }</style></head>
  <body>
    <nav><a href="/">Home</a><a href="/patients">Patients</a><a href="/caregivers">Caregivers</a><a href="/messages">Messages</a><a href="/expert">Expert</a><a href="/debug">Debug</a></nav>
    <h1>Debug Logs</h1>
    {% for log in logs %}
    <div class="log"><p><strong>Log {{ log.id }}</strong> thread={{ log.thread_id }} message={{ log.message_id }}</p><pre>{{ log.payload }}</pre></div>
    {% else %}
    <div class="log"><p>No logs found.</p></div>
    {% endfor %}
  </body>
</html>
